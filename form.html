<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Submit Your Info</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    background-image: url('xpwallpaper.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
  }
  /* Card opacity adjusted from 0.88 to 0.65 for an extra transparent vibe */
  .card { background: rgba(255, 255, 255, 0.65); backdrop-filter: blur(8px); border-radius: 16px; padding: 2rem; width: 100%; max-width: 460px; box-shadow: 0 8px 32px rgba(0,0,0,0.18); }
  h1 { font-size: 22px; font-weight: 600; color: #1a1a2e; margin-bottom: 1.5rem; }
  .subtitle { font-size: 14px; color: #64748b; margin-bottom: 1.5rem; }
  .field { margin-bottom: 1rem; }
  label { display: block; font-size: 13px; font-weight: 500; color: #374151; margin-bottom: 5px; }
  input, textarea { width: 100%; padding: 9px 12px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 14px; color: #1a1a2e; transition: border-color 0.15s; outline: none; font-family: inherit; background: rgba(255,255,255,0.9); }
  input:focus, textarea:focus { border-color: #2dd4bf; box-shadow: 0 0 0 3px rgba(45,212,191,0.15); }
  textarea { resize: vertical; min-height: 80px; }
  .required { color: #e24b4a; }
  
  /* NEW: Shifting rainbow gradient styling */
  button { 
    width: 100%; 
    padding: 11px; 
    background: linear-gradient(45deg, #ff007f, #ff7f00, #fffe00, #00ff00, #00ffff, #0000ff, #7f00ff, #ff007f);
    background-size: 400% 400%;
    animation: rainbow 8s ease infinite;
    color: #fff; 
    text-shadow: 1px 1px 2px rgba(0,0,0,0.6);
    border: none; 
    border-radius: 8px; 
    font-size: 15px; 
    font-weight: bold; 
    cursor: pointer; 
    margin-top: 0.5rem; 
    transition: transform 0.15s; 
  }
  button:hover { 
    transform: scale(1.02);
  }
  button:disabled { 
    background: #94a3b8; 
    animation: none; 
    cursor: not-allowed; 
  }
  
  /* NEW: Rainbow gradient animation movement path */
  @keyframes rainbow {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .success { display: none; margin-top: 1rem; background: #ecfdf5; border: 1px solid #6ee7b7; color: #065f46; padding: 12px 16px; border-radius: 8px; font-size: 14px; text-align: center; }
  .error-msg { display: none; margin-top: 1rem; background: #fef2f2; border: 1px solid #fca5a5; color: #b91c1c; padding: 12px 16px; border-radius: 8px; font-size: 14px; text-align: center; }
  .field-error { display: none; color: #b91c1c; font-size: 12px; margin-top: 4px; }
</style>
</head>
<body>
<div class="card">
  <h1>Enter your details 🥰</h1>

  <div class="field">
    <label for="name">Full name</label>
    <input type="text" id="name" placeholder="Bihani Pythun" />
    <div class="field-error" id="err-name">Please enter your name.</div>
  </div>
  
  <div class="field">
    <label for="age">Age</label>
    <input type="number" id="age" placeholder="69" min="1" max="120" />
    <div class="field-error" id="err-age">Please enter a valid age (1–120).</div>
  </div>
  
  <!-- FIXED: Broken duplicated tags removed here -->
  <div class="field">
    <label for="note">Note</label>
    <textarea id="note" placeholder="Yap some shi..."></textarea>
    <div class="field-error" id="err-note">Please fill out the note field.</div>
  </div>

  <button id="submit-btn" onclick="submitForm()">Submit</button>
  <div class="success" id="success">✓ Alright! Time to sleep 😴</div>
  <div class="error-msg" id="error-msg">⚠ Something went wrong. Please try again.</div>
</div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwdBaZ5AkQYQ8K7FqFRv1YXTnRYUbuUTgBV34dXNYG1wOuQfSfUwarOcrvU6zlsuwljzw/exec';

  async function submitForm() {
    let valid = true;
    const name  = document.getElementById('name').value.trim();
    const age   = document.getElementById('age').value.trim();
    const note  = document.getElementById('note').value.trim();

    // Reset previous error layouts and execution flags
    document.querySelectorAll('.field-error').forEach(e => e.style.display = 'none');
    document.getElementById('success').style.display = 'none';
    document.getElementById('error-msg').style.display = 'none';

    // Form Field Validations
    if (!name) { document.getElementById('err-name').style.display = 'block'; valid = false; }
    if (!age || isNaN(age) || age < 1 || age > 120) { document.getElementById('err-age').style.display = 'block'; valid = false; }
    if (!note) { document.getElementById('err-note').style.display = 'block'; valid = false; }
    
    if (!valid) return;

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'Submitting...';

    try {
      await fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, age: parseInt(age), note })
      });
      // Clear out inputs upon successful delivery loop
      ['name','age','note'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('success').style.display = 'block';
    } catch (err) {
      document.getElementById('error-msg').style.display = 'block';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Submit';
    }
  }
</script>
</body>
</html>
