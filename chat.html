<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Sheets Live Chat</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-image: url('xpwallpaper.jpg'); 
            background-size: cover; 
            background-position: center; 
            background-repeat: no-repeat; 
            background-attachment: fixed;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        
        .chat-container { 
            width: 420px; 
            height: 520px;
            background: rgba(255, 255, 255, 0.83); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12), 0 1px 3px rgba(0, 0, 0, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.4);
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }
        
        .chat-header { 
            color: #3a4f41; 
            padding: 20px; 
            text-align: center; 
            font-weight: 600; 
            font-size: 1.15rem;
            letter-spacing: -0.3px;
            background: rgba(233, 240, 236, 0.6); 
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            flex-shrink: 0; /* Ensures the header doesn't shrink */
        }
        
        .chat-messages { 
            flex: 1; 
            padding: 20px; 
            overflow-y: auto; 
            background: transparent;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .message { 
            padding: 10px 14px; 
            border-radius: 14px; 
            background: #ffffff; 
            max-width: 80%; 
            word-wrap: break-word; 
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(0, 0, 0, 0.02);
            align-self: flex-start;
            animation: fadeIn 0.25s ease-out;
        }
        
        .message .username { 
            font-weight: 600; 
            color: #5c7865; 
            display: block; 
            font-size: 0.8rem; 
            margin-bottom: 3px;
            letter-spacing: -0.1px;
        }
        
        .message .text-content {
            color: #2c3530;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .chat-input-area { 
            display: flex; 
            padding: 16px; 
            background: rgba(255, 255, 255, 0.5); 
            border-top: 1px solid rgba(0, 0, 0, 0.05);
            gap: 8px; 
            flex-shrink: 0; /* Protects input area from getting squeezed */
            box-sizing: border-box;
            width: 100%;
        }
        
        .chat-input-area input { 
            padding: 12px 16px; 
            border: 1px solid rgba(0, 0, 0, 0.08); 
            border-radius: 25px; 
            outline: none; 
            background: #ffffff;
            font-size: 0.9rem;
            color: #2c3530;
            transition: all 0.2s ease;
            box-sizing: border-box;
        }
        
        .chat-input-area input:focus {
            border-color: #8fae98;
            box-shadow: 0 0 0 3px rgba(143, 174, 152, 0.15);
        }
        
        #usernameInput { 
            width: 85px; 
            text-align: center;
            flex-shrink: 0; /* Won't get squished */
        }
        
        #messageInput { 
            flex: 1; 
            min-width: 0; /* Allows input to properly shrink to fill layout */
        }
        
        .chat-input-area button { 
            background: #73937e; 
            color: white; 
            border: none; 
            padding: 0 20px; 
            height: 43px; /* Explicit height matching input boxes */
            border-radius: 25px; 
            cursor: pointer; 
            font-weight: 500;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            box-shadow: 0 2px 5px rgba(115, 147, 126, 0.2);
            flex-shrink: 0; /* Forces full send button to stay visible */
            white-space: nowrap;
        }
        
        .chat-input-area button:hover { 
            background: #5c7865; 
            transform: translateY(-1px);
        }
        
        .chat-input-area button:active {
            transform: translateY(0);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">🍥 Shared Space Chat</div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-area">
        <input type="text" id="usernameInput" placeholder="Name" maxlength="12" required />
        <input type="text" id="messageInput" placeholder="Type a friendly message..." maxlength="150" required />
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwgM1F6q_8_tSNvClZBD8dczOi5B11cQyePnwBymX6rJIsT0Q8f-vrxQV8WDrPv6fIJzQ/exec"; 
    let isUserScrolling = false;
    let localMessageCount = 0; // Tracks number of loaded messages to stop UI flashes

    const chatMessages = document.getElementById("chatMessages");
    chatMessages.addEventListener('scroll', () => {
        if (chatMessages.scrollHeight - chatMessages.scrollTop - chatMessages.clientHeight > 50) {
            isUserScrolling = true;
        } else {
            isUserScrolling = false;
        }
    });

    async function loadMessages() {
        try {
            const response = await fetch(`${WEB_APP_URL}?action=getMessages`);
            const data = await response.json();
            
            // Only update DOM if new entries exist to eliminate flickering
            if (data.length !== localMessageCount) {
                // If messages were somehow deleted or cleared, reset container cleanly
                if (data.length < localMessageCount) {
                    chatMessages.innerHTML = "";
                    localMessageCount = 0;
                }

                // Append only the newly added items
                for (let i = localMessageCount; i < data.length; i++) {
                    const msg = data[i];
                    const msgDiv = document.createElement("div");
                    msgDiv.classList.add("message");
                    msgDiv.innerHTML = `<span class="username">${escapeHTML(msg.username)}</span><span class="text-content">${escapeHTML(msg.message)}</span>`;
                    chatMessages.appendChild(msgDiv);
                }
                
                localMessageCount = data.length; // Update baseline count
                
                if (!isUserScrolling) {
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                }
            }
        } catch (error) {
            console.error("Error loading messages:", error);
        }
    }

    async function sendMessage() {
        const username = document.getElementById("usernameInput").value.trim();
        const message = document.getElementById("messageInput").value.trim();

        if (!username || !message) {
            return;
        }

        const payload = {
            action: "sendMessage",
            username: username,
            message: message
        };

        document.getElementById("messageInput").value = "";
        isUserScrolling = false; 

        try {
            await fetch(WEB_APP_URL, {
                method: "POST",
                mode: "no-cors", 
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
            
            // Fast background load after typing
            setTimeout(loadMessages, 300); 
        } catch (error) {
            console.error("Error sending message:", error);
        }
    }

    document.getElementById("messageInput").addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            sendMessage();
        }
    });

    function escapeHTML(str) {
        return str.replace(/[&<>'"]/g, 
            tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
        );
    }

    setInterval(loadMessages, 2000);
    loadMessages();
</script>

</body>
</html>
