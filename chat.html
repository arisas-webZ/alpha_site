<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Sheets Live Chat</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .chat-container { width: 400px; background: white; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
        .chat-header { bg-color: #007bff; color: white; padding: 15px; text-align: center; font-weight: bold; background: #007bff; }
        .chat-messages { flex: 1; padding: 15px; height: 300px; overflow-y: auto; border-bottom: 1px solid #ddd; background: #fafafa; }
        .message { margin-bottom: 10px; padding: 8px 12px; border-radius: 5px; background: #e9ecef; max-width: 80%; word-wrap: break-word; }
        .message .username { font-weight: bold; color: #007bff; display: block; font-size: 0.85em; }
        .chat-input-area { display: flex; padding: 10px; background: #fff; gap: 5px; }
        .chat-input-area input { padding: 10px; border: 1px solid #ddd; border-radius: 4px; outline: none; }
        #usernameInput { width: 80px; }
        #messageInput { flex: 1; }
        .chat-input-area button { background: #007bff; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; }
        .chat-input-area button:hover { background: #0056b3; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">SheetChat Live</div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-area">
        <input type="text" id="usernameInput" placeholder="Name" required />
        <input type="text" id="messageInput" placeholder="Type a message..." required />
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    // Paste your Google Apps Script Web App URL here
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwgM1F6q_8_tSNvClZBD8dczOi5B11cQyePnwBymX6rJIsT0Q8f-vrxQV8WDrPv6fIJzQ/exec"; 

    // Fetch messages from Google Sheets
    async function loadMessages() {
        try {
            const response = await fetch(`${WEB_APP_URL}?action=getMessages`);
            const data = await response.json();
            const chatMessages = document.getElementById("chatMessages");
            
            // Clear current view and rebuild
            chatMessages.innerHTML = "";
            data.forEach(msg => {
                const msgDiv = document.createElement("div");
                msgDiv.classList.add("message");
                msgDiv.innerHTML = `<span class="username">${escapeHTML(msg.username)}</span>${escapeHTML(msg.message)}`;
                chatMessages.appendChild(msgDiv);
            });
            
            // Auto-scroll to the newest message
            chatMessages.scrollTop = chatMessages.scrollHeight;
        } catch (error) {
            console.error("Error loading messages:", error);
        }
    }

    // Send a new message to Google Sheets
    async function sendMessage() {
        const username = document.getElementById("usernameInput").value.trim();
        const message = document.getElementById("messageInput").value.trim();

        if (!username || !message) {
            alert("Please fill in both Name and Message fields.");
            return;
        }

        const payload = {
            action: "sendMessage",
            username: username,
            message: message
        };

        // Clear message box immediately for better user experience
        document.getElementById("messageInput").value = "";

        try {
            await fetch(WEB_APP_URL, {
                method: "POST",
                mode: "no-cors", // Required to bypass strict CORS constraints on Apps Script POST
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
            
            // Force a quick refresh after sending
            setTimeout(loadMessages, 500); 
        } catch (error) {
            console.error("Error sending message:", error);
        }
    }

    // Helper function to prevent XSS script injection attacks
    function escapeHTML(str) {
        return str.replace(/[&<>'"]/g, 
            tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
        );
    }

    // Polling System: Check for new messages automatically every 3 seconds
    setInterval(loadMessages, 3000);

    // Initial load when page opens
    loadMessages();
</script>

</body>
</html>
