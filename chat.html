<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Live Chat</title>

<style>
body{
    font-family:Arial;
    background:#f3f3f3;
}

#chat{
    width:500px;
    height:500px;
    margin:auto;
    margin-top:30px;
    background:white;
    border-radius:10px;
    display:flex;
    flex-direction:column;
    overflow:hidden;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}

#messages{
    flex:1;
    overflow-y:auto;
    padding:15px;
}

.msg{
    margin-bottom:12px;
}

.name{
    font-weight:bold;
    color:#1565c0;
}

.time{
    color:gray;
    font-size:12px;
}

#bottom{
    display:flex;
    border-top:1px solid #ddd;
}

input{
    padding:10px;
    font-size:16px;
}

#name{
    width:120px;
}

#message{
    flex:1;
}

button{
    width:90px;
    background:#1565c0;
    color:white;
    border:none;
}
</style>

</head>

<body>

<div id="chat">

<div id="messages"></div>

<div id="bottom">
<input id="name" placeholder="Name">
<input id="message" placeholder="Message">
<button onclick="send()">Send</button>
</div>

</div>

<script>

const scriptURL="https://script.google.com/macros/s/AKfycbyyaWIa7idEPpG436ODInw1g6df9jtxLxcqfyFrk7zb79BFyqTZwAxFFAVjWDFBDwQkZg/exec";

function escapeHTML(str){
    return str
      .replace(/&/g,"&amp;")
      .replace(/</g,"&lt;")
      .replace(/>/g,"&gt;");
}

async function load(){

let response=await fetch(scriptURL+"?action=get");
let data=await response.json();

let html="";

data.forEach(row=>{

html+=`
<div class="msg">
<div class="name">${escapeHTML(row.name)}</div>
<div>${escapeHTML(row.message)}</div>
<div class="time">${row.time}</div>
</div>
`;

});

document.getElementById("messages").innerHTML=html;

let box=document.getElementById("messages");
box.scrollTop=box.scrollHeight;

}

async function send(){

let name=document.getElementById("name").value.trim();
let message=document.getElementById("message").value.trim();

if(message=="") return;

await fetch(scriptURL,{
method:"POST",
body:JSON.stringify({
name:name,
message:message
})
});

document.getElementById("message").value="";

load();

}

load();

setInterval(load,2000);

</script>

</body>
</html>
