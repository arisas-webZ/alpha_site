<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Submissions</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f0f4f8; min-height: 100vh; }

  /* ── Login screen ── */
  #login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; }
  .login-card { background: #fff; border-radius: 16px; padding: 2rem; width: 100%; max-width: 340px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
  .login-card h1 { font-size: 20px; font-weight: 600; color: #1a1a2e; margin-bottom: 6px; }
  .login-card p { font-size: 13px; color: #64748b; margin-bottom: 1.25rem; }
  .login-card input { width: 100%; padding: 9px 12px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 14px; outline: none; margin-bottom: 0.75rem; font-family: inherit; }
  .login-card input:focus { border-color: #2dd4bf; box-shadow: 0 0 0 3px rgba(45,212,191,0.15); }
  .login-btn { width: 100%; padding: 10px; background: #1b2a4a; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; }
  .login-btn:hover { background: #263c6a; }
  .login-error { color: #b91c1c; font-size: 13px; margin-top: 8px; display: none; }

  /* ── Dashboard ── */
  #dashboard { display: none; }
  .topbar { background: #1b2a4a; color: #fff; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
  .topbar h1 { font-size: 17px; font-weight: 600; }
  .logout-btn { background: none; border: 1px solid rgba(255,255,255,0.3); color: #fff; padding: 5px 12px; border-radius: 6px; font-size: 13px; cursor: pointer; }
  .logout-btn:hover { background: rgba(255,255,255,0.1); }

  .content { padding: 1.5rem; max-width: 860px; margin: 0 auto; }

  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin-bottom: 1.5rem; }
  .metric { background: #fff; border-radius: 10px; padding: 14px 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .metric-label { font-size: 12px; color: #64748b; margin-bottom: 4px; }
  .metric-value { font-size: 26px; font-weight: 600; color: #1a1a2e; }

  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .section-header h2 { font-size: 15px; font-weight: 600; color: #1a1a2e; }
  .clear-btn { background: none; border: 1px solid #e2e8f0; border-radius: 6px; padding: 5px 12px; font-size: 12px; color: #64748b; cursor: pointer; }
  .clear-btn:hover { background: #fef2f2; border-color: #fca5a5; color: #b91c1c; }

  .export-btn { background: none; border: 1px solid #e2e8f0; border-radius: 6px; padding: 5px 12px; font-size: 12px; color: #64748b; cursor: pointer; margin-right: 6px; }
  .export-btn:hover { background: #f0f4f8; }

  table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  thead { background: #f8fafc; }
  th { text-align: left; padding: 10px 14px; font-size: 12px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 1px solid #e2e8f0; }
  td { padding: 11px 14px; font-size: 13px; color: #374151; border-bottom: 1px solid #f1f5f9; vertical-align: top; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f8fafc; }
  .del-btn { background: none; border: none; color: #94a3b8; cursor: pointer; font-size: 16px; padding: 2px 4px; border-radius: 4px; }
  .del-btn:hover { color: #b91c1c; background: #fef2f2; }

  .empty { text-align: center; padding: 3rem; color: #94a3b8; background: #fff; border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .empty p { font-size: 14px; margin-top: 4px; }

  .badge { display: inline-block; background: #ecfdf5; color: #065f46; border-radius: 20px; padding: 2px 8px; font-size: 11px; font-weight: 500; }
  .note-cell { max-width: 180px; color: #64748b; font-style: italic; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
</style>
</head>
<body>

<!-- ── LOGIN SCREEN ── -->
<div id="login-screen">
  <div class="login-card">
    <h1>Admin login</h1>
    <p>Enter your password to view submissions.</p>
    <input type="password" id="pw-input" placeholder="Password" onkeydown="if(event.key==='Enter')login()" />
    <button class="login-btn" onclick="login()">Log in</button>
    <div class="login-error" id="login-error">Incorrect password. Try again.</div>
  </div>
</div>

<!-- ── DASHBOARD ── -->
<div id="dashboard">
  <div class="topbar">
    <h1>📋 Submissions dashboard</h1>
    <button class="logout-btn" onclick="logout()">Log out</button>
  </div>
  <div class="content">
    <div class="metrics">
      <div class="metric"><div class="metric-label">Total submissions</div><div class="metric-value" id="m-total">0</div></div>
      <div class="metric"><div class="metric-label">Average age</div><div class="metric-value" id="m-avg">—</div></div>
      <div class="metric"><div class="metric-label">With email</div><div class="metric-value" id="m-email">0</div></div>
    </div>

    <div class="section-header">
      <h2>All entries</h2>
      <div>
        <button class="export-btn" onclick="exportCSV()">⬇ Export CSV</button>
        <button class="clear-btn" onclick="clearAll()">✕ Clear all</button>
      </div>
    </div>

    <div id="table-wrap"></div>
  </div>
</div>

<script>
  // ── SETTINGS ────────────────────────────────────────────────────
  const ADMIN_PASSWORD = 'admin123';      // ← Change this password!
  const STORAGE_KEY    = 'my_form_submissions'; // Must match form.html
  // ────────────────────────────────────────────────────────────────

  function login() {
    const pw = document.getElementById('pw-input').value;
    if (pw === ADMIN_PASSWORD) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      renderDashboard();
    } else {
      document.getElementById('login-error').style.display = 'block';
    }
  }

  function logout() {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('pw-input').value = '';
    document.getElementById('login-error').style.display = 'none';
  }

  function getEntries() {
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  }

  function saveEntries(entries) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
  }

  function deleteEntry(id) {
    if (!confirm('Delete this entry?')) return;
    saveEntries(getEntries().filter(e => e.id !== id));
    renderDashboard();
  }

  function clearAll() {
    if (!confirm('Delete ALL submissions? This cannot be undone.')) return;
    localStorage.removeItem(STORAGE_KEY);
    renderDashboard();
  }

  function exportCSV() {
    const entries = getEntries();
    if (!entries.length) return alert('No entries to export.');
    const rows = [['Name','Age','Email','Note','Submitted']];
    entries.forEach(e => rows.push([e.name, e.age, e.email, e.note, e.time]));
    const csv = rows.map(r => r.map(v => `"${String(v||'').replace(/"/g,'""')}"`).join(',')).join('\n');
    const a = document.createElement('a');
    a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
    a.download = 'submissions.csv';
    a.click();
  }

  function renderDashboard() {
    const entries = getEntries().slice().reverse();
    const ages = entries.filter(e => e.age).map(e => e.age);

    document.getElementById('m-total').textContent = entries.length;
    document.getElementById('m-avg').textContent = ages.length ? Math.round(ages.reduce((a,b)=>a+b,0)/ages.length) : '—';
    document.getElementById('m-email').textContent = entries.filter(e => e.email).length;

    const wrap = document.getElementById('table-wrap');
    if (!entries.length) {
      wrap.innerHTML = '<div class="empty"><div style="font-size:32px">📭</div><p>No submissions yet. Share form.html with your users.</p></div>';
      return;
    }
    wrap.innerHTML = `
      <table>
        <thead><tr>
          <th>#</th><th>Name</th><th>Age</th><th>Email</th><th>Note</th><th>Submitted</th><th></th>
        </tr></thead>
        <tbody>
          ${entries.map((e,i) => `
            <tr>
              <td style="color:#94a3b8">${entries.length - i}</td>
              <td><strong>${e.name}</strong></td>
              <td><span class="badge">${e.age}</span></td>
              <td>${e.email ? `<a href="mailto:${e.email}" style="color:#0ea5e9">${e.email}</a>` : '<span style="color:#cbd5e1">—</span>'}</td>
              <td class="note-cell" title="${e.note||''}">${e.note || '<span style="color:#cbd5e1">—</span>'}</td>
              <td style="color:#94a3b8;white-space:nowrap">${e.time}</td>
              <td><button class="del-btn" onclick="deleteEntry(${e.id})" title="Delete">✕</button></td>
            </tr>
          `).join('')}
        </tbody>
      </table>`;
  }
</script>
</body>
</html>
